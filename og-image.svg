<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3E8FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="150" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="550" r="120" fill="rgba(255,255,255,0.1)"/>
  <circle cx="600" cy="-50" r="100" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Main Content -->
  <g>
    <!-- Heart Icon -->
    <text x="600" y="120" font-size="120" text-anchor="middle" fill="white">❤️</text>
    
    <!-- Main Headline -->
    <text x="600" y="280" font-size="72" font-weight="bold" text-anchor="middle" fill="white" font-family="Montserrat, sans-serif">
      She Left You...
    </text>
    
    <!-- Subheadline -->
    <text x="600" y="360" font-size="56" font-weight="bold" text-anchor="middle" fill="white" font-family="Montserrat, sans-serif">
      But Is It Really Over?
    </text>
    
    <!-- CTA Text -->
    <text x="600" y="450" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Open Sans, sans-serif">
      Take the Free 2-Minute Quiz
    </text>
    
    <!-- Stats -->
    <text x="600" y="530" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Open Sans, sans-serif">
      47k+ Men Already Helped • 4.8★ Rating
    </text>
  </g>
</svg>